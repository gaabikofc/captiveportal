<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Acesso Wi-Fi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="./assets/styles.css" rel="stylesheet">
</head>
<body>
    <main class="page-shell">
        <section class="access-card">
            <div class="wifi-badge">
                <i class="bi bi-wifi"></i>
            </div>

            <div class="intro-copy">
                <h1 class="hero-title">Acesso Wi-Fi Visitante</h1>
                <p class="hero-text">Preencha seus dados para solicitar liberacao da internet.</p>
            </div>

            <div class="notice-strip">
                <i class="bi bi-shield-check"></i>
                <span>Seu cadastro e enviado com seguranca para a API do captive portal.</span>
            </div>

            <div id="alertContainer"></div>

            <form id="captiveForm" class="step-box active-step" novalidate>
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" class="form-control" id="nome" name="nome" maxlength="120" required>
                </div>

                <div class="mb-3">
                    <label for="telefone" class="form-label">Telefone</label>
                    <input type="tel" class="form-control" id="telefone" name="telefone" maxlength="15" placeholder="(11) 99999-9999" required>
                </div>

                <div class="mb-3">
                    <label for="ip" class="form-label">IP</label>
                    <input type="text" class="form-control" id="ip" name="ip" placeholder="Preenchido automaticamente quando disponivel">
                </div>

                <div class="mb-4">
                    <label for="macAddress" class="form-label">MAC Address</label>
                    <input type="text" class="form-control" id="macAddress" name="macAddress" placeholder="AA:BB:CC:DD:EE:FF">
                </div>

                <button type="submit" class="btn btn-success cta-button w-100" id="submitButton">
                    Solicitar acesso
                </button>
            </form>

            <section id="statusPanel" class="password-box hidden-panel mt-4">
                <h2 class="h4 mb-2">Status da Solicitacao</h2>
                <p class="mb-3" id="statusMessage">Aguardando liberacao.</p>
                <div class="status-meta" id="statusMeta"></div>
                <button type="button" class="btn btn-outline-secondary w-100 reset-button mt-3" id="resetButton">
                    Novo cadastro
                </button>
            </section>
        </section>
    </main>

    <script src="./assets/config.js"></script>
    <script src="./assets/app.js" defer></script>
</body>
</html>
